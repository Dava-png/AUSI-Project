<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Mr. Kicks Mal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Assets/css/auth.css">
</head>
<body>

    <div class="auth-container">

        <div class="auth-left">
            <a href="beranda.html" class="auth-brand">
                <i class="fa-solid fa-shoe-prints logo-icon"></i>
                <div class="logo-text">Mr. <span>Kicks</span><small>MAL</small></div>
            </a>

            <div class="auth-card">
                <div class="auth-card-header">
                    <div class="icon-circle">
                        <i class="fa-solid fa-right-to-bracket"></i>
                    </div>
                    <h1>Selamat Datang</h1>
                    <p>Masuk ke akun Mr. Kicks Anda</p>
                </div>

                <form>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" placeholder="contoh@gmail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Kata Sandi</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Masukkan kata sandi" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-group">
                            <input type="checkbox" checked>
                            Ingat saya
                        </label>
                        <a href="#" class="forgot-link">Lupa password?</a>
                    </div>

                    <a href="beranda.html" class="btn-primary" style="text-decoration:none;">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                        Masuk
                    </a>
                </form>

                <div class="auth-divider">atau</div>

                <a href="beranda.html?mode=guest" class="btn-guest">
                    <i class="fa-solid fa-eye"></i>
                    Lanjut sebagai Tamu
                </a>

                <p class="auth-footer-text">
                    Belum punya akun? <a href="register.html">Daftar</a>
                </p>
            </div>
        </div>

        <div class="auth-right">
            <h2>RAWAT SEPATU,<br><span>TAMPIL MAKSIMAL!</span></h2>
            <p>Layanan perawatan sepatu profesional untuk sepatu bersih, wangi, dan tahan lama.</p>
            <div class="badge-auth">BERSIH WANGI TERAWAT</div>
            <i class="fa-solid fa-socks big-icon"></i>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Mr. Kicks Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../Assets/css/kicks.css">
    <link rel="stylesheet" href="../../Assets/css/admin.css">
</head>
<body>

    <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-inner">
                    <i class="fa-solid fa-shoe-prints logo-icon"></i>
                    <div>
                        <div class="logo-text">Mr. <span>Kicks</span></div>
                        <div class="logo-sub">— ADMIN —</div>
                    </div>
                </div>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="admin.html" class="nav-link">
                        <i class="fas fa-chart-pie"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-products.html" class="nav-link">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-orders.html" class="nav-link active">
                        <i class="fas fa-file-alt"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-chat.html" class="nav-link">
                        <i class="fas fa-comment-dots"></i>
                        <span>Chat</span>
                    </a>
                </li>
            </ul>

            <div class="logout-section">
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log out</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="orderSearch" placeholder="Search...">
                </div>
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="user-info">
                        <h4>Admin Panel</h4>
                        <p>Manage Orders</p>
                    </div>
                </div>
            </div>

            <section class="page-section active">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Orders</h1>
                        <p class="page-subtitle">Kelola pesanan pelanggan.</p>
                    </div>
                </div>

                <div class="admin-content">
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Pelanggan</th>
                                    <th>Item</th>
                                    <th>Tanggal</th>
                                    <th>Total</th>
                                    <th>Alamat</th>
                                    <th>Pickup Date</th>
                                    <th>Status</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body"></tbody>
                        </table>
                    </div>
                    <div class="empty-state" id="orders-empty" style="display:none;">
                        <i class="fas fa-inbox"></i>
                        <h3>Belum ada pesanan</h3>
                        <p>Pesanan dari pelanggan akan muncul di sini.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toast-msg">Berhasil disimpan</span></div>

    <script src="../../Assets/js/api.js"></script>
    <script src="../../Assets/js/kicks.js"></script>
    <script src="../../Assets/js/admin.js"></script>
    <script>
        async function renderOrders() {
            const d = await getData();
            const tbody = document.getElementById('orders-table-body');
            const empty = document.getElementById('orders-empty');
            tbody.innerHTML = '';
            if (d.orders.length === 0) { empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            d.orders.forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + o.id + '</td><td>' + o.customer + '</td><td>' + o.item + '</td><td>' + o.date + '</td><td>' + formatPrice(o.total) + '</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (o.pickup_address || '') + '">' + (o.pickup_address || '-') + '</td><td>' + (o.pickup_date || '-') + '</td><td>' + getStatusBadge(o.status) + '</td><td class="actions"><select class="status-select" onchange="updateOrderStatus(\'' + o.id + '\', this.value)"><option value="processing"' + (o.status === 'processing' ? ' selected' : '') + '>Processing</option><option value="shipped"' + (o.status === 'shipped' ? ' selected' : '') + '>Shipped</option><option value="delivered"' + (o.status === 'delivered' ? ' selected' : '') + '>Delivered</option><option value="completed"' + (o.status === 'completed' ? ' selected' : '') + '>Completed</option><option value="cancelled"' + (o.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option></select><button class="btn-delete" onclick="deleteOrder(\'' + o.id + '\')"><i class="fas fa-trash"></i></button></td>';
                tbody.appendChild(tr);
            });
        }

        async function updateOrderStatus(id, status) {
            try {
                await api.updateOrderStatus(id, status);
                await renderOrders();
                showToast('Status pesanan diperbarui');
            } catch (err) {
                console.error('Update order status error:', err);
                showToast('Gagal memperbarui status');
            }
        }

        async function deleteOrder(id) {
            if (!confirm('Yakin ingin menghapus pesanan ' + id + '?')) return;
            try {
                await api.deleteOrder(id);
                await renderOrders();
                showToast('Pesanan berhasil dihapus');
            } catch (err) {
                showToast('Gagal menghapus pesanan');
            }
        }

        function filterOrderTable() {
            const q = document.getElementById('orderSearch').value.toLowerCase();
            document.querySelectorAll('#orders-table-body tr').forEach(tr => {
                tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        document.addEventListener('DOMContentLoaded', async function () {
            const session = JSON.parse(sessionStorage.getItem('mrkicks_user') || '{}');
            if (session.role !== 'admin') { window.location.href = '../login.html'; return; }
            await seedData();
            await renderOrders();
            document.getElementById('orderSearch').addEventListener('input', filterOrderTable);
            const toggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            if (toggle && sidebar) { toggle.addEventListener('click', function () { sidebar.classList.toggle('active'); }); }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Mr. Kicks Mal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../Assets/css/kicks.css">
</head>
<body>

    <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-inner">
                    <i class="fa-solid fa-shoe-prints logo-icon"></i>
                    <div>
                        <div class="logo-text">Mr. <span>Kicks</span></div>
                        <div class="logo-sub">— MAL —</div>
                    </div>
                </div>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="beranda.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>Home page</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link">
                        <i class="fas fa-box"></i>
                        <span>Product</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="services.html" class="nav-link">
                        <i class="fas fa-th-large"></i>
                        <span>Our services</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="orders.html" class="nav-link">
                        <i class="fas fa-file-alt"></i>
                        <span>My orders</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="history.html" class="nav-link active">
                        <i class="fas fa-clock"></i>
                        <span>History</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="chat.html" class="nav-link">
                        <i class="fas fa-comment-dots"></i>
                        <span>Chat</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="settings.html" class="nav-link">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </li>

            </ul>

            <div class="logout-section">
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-info">
                        <h4>Halo, Tol !</h4>
                        <p>Welcome back</p>
                    </div>
                </div>
            </div>

            <!-- History Page -->
            <section class="page-section active">
                <div class="page-header">
                    <h1 class="page-title">History</h1>
                    <p class="page-subtitle">Riwayat pesanan yang telah selesai.</p>
                </div>

                <div class="orders-table-container">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Item</th>
                                <th>Date</th>
                                <th>Price</th>
                                <th>Selesai</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <tr>
                                <td colspan="5" style="text-align:center;color:var(--color-text-muted);padding:40px;">
                                    <i class="fas fa-clock" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                                    Memuat riwayat...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../../Assets/js/api.js"></script>
    <script src="../../Assets/js/kicks.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const history = await api.getHistory();
                const tbody = document.getElementById('history-body');
                if (history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-text-muted);padding:40px;"><i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:12px;"></i>Belum ada riwayat pesanan.</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                history.forEach(h => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td>' + h.order_id + '</td><td>' + h.item + '</td><td>' + h.date + '</td><td>Rp ' + Number(h.total).toLocaleString('id-ID') + '</td><td><span class="status-badge status-completed">Selesai</span></td>';
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('history-body').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-text-muted);padding:40px;"><i class="fas fa-exclamation-triangle" style="font-size:32px;display:block;margin-bottom:12px;"></i>Gagal memuat riwayat.</td></tr>';
            }
        });
    </script>
</body>
</html>
